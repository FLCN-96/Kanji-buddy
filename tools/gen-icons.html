<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>kanji-buddy · icon generator</title>
<style>
  body { background: #0a0e14; color: #00e5ff; font-family: monospace; padding: 32px; }
  canvas { display: block; margin: 12px 0; border: 1px solid #00e5ff44; }
  button {
    background: #0a0e14; border: 1px solid #00e5ff; color: #00e5ff;
    padding: 8px 20px; font-family: monospace; font-size: 13px;
    letter-spacing: .1em; cursor: pointer; margin: 4px 4px 4px 0;
  }
  button:hover { background: #00e5ff; color: #0a0e14; }
  h2 { margin: 24px 0 8px; font-size: 13px; letter-spacing: .1em; }
</style>
</head>
<body>
<h1 style="font-size:16px;letter-spacing:.15em">▸ ICON GENERATOR // kanji-buddy</h1>
<p style="color:#666;font-size:12px">Generate PNG icons for PWA install. Save each file to <code>icons/</code>.</p>

<h2>▸ icon-192.png</h2>
<canvas id="c192" width="192" height="192"></canvas>
<button onclick="dl('c192','icon-192.png')">↓ download icon-192.png</button>

<h2>▸ icon-512.png</h2>
<canvas id="c512" width="512" height="512"></canvas>
<button onclick="dl('c512','icon-512.png')">↓ download icon-512.png</button>

<h2>▸ icon-512-maskable.png (safe zone = 80%)</h2>
<canvas id="cm512" width="512" height="512"></canvas>
<button onclick="dl('cm512','icon-512-maskable.png')">↓ download icon-512-maskable.png</button>

<script>
function drawIcon(canvas, size, maskable) {
  const ctx = canvas.getContext('2d');
  const s = size;

  // background
  ctx.fillStyle = '#0a0e14';
  ctx.fillRect(0, 0, s, s);

  // border (non-maskable only)
  if (!maskable) {
    ctx.strokeStyle = '#00e5ff';
    ctx.globalAlpha = 0.35;
    ctx.lineWidth = s * 0.012;
    ctx.strokeRect(s * 0.05, s * 0.05, s * 0.9, s * 0.9);
    ctx.globalAlpha = 1;
  }

  // glow
  const glowSize = maskable ? s * 0.44 : s * 0.5;
  const cx = s / 2, cy = s * (maskable ? 0.52 : 0.56);
  const grad = ctx.createRadialGradient(cx, cy, 0, cx, cy, glowSize);
  grad.addColorStop(0, 'rgba(0,229,255,0.18)');
  grad.addColorStop(1, 'rgba(0,229,255,0)');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, s, s);

  // kanji
  const fontSize = maskable ? s * 0.5 : s * 0.58;
  ctx.font = `${fontSize}px serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';

  // subtle shadow for depth
  ctx.shadowColor = '#00e5ff';
  ctx.shadowBlur = s * 0.06;
  ctx.fillStyle = '#00e5ff';
  ctx.fillText('漢', cx, cy);
  ctx.shadowBlur = 0;
}

const c192  = document.getElementById('c192');
const c512  = document.getElementById('c512');
const cm512 = document.getElementById('cm512');

drawIcon(c192,  192, false);
drawIcon(c512,  512, false);
drawIcon(cm512, 512, true);

function dl(id, name) {
  const a = document.createElement('a');
  a.href = document.getElementById(id).toDataURL('image/png');
  a.download = name;
  a.click();
}
</script>
</body>
</html>
