<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>kanji-buddy · diagnostics</title>
<link rel="stylesheet" href="home.css">
<link rel="stylesheet" href="settings.css">
<link rel="stylesheet" href="diagnostics.css">
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icons/icon.svg" type="image/svg+xml">
<meta name="theme-color" content="#22d3ee">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
</head>
<body data-scanlines="off" data-hero="on">
<div id="root"></div>

<script src="data/rank.js"></script>
<script src="data/streak.js"></script>
<script src="data/version.js"></script>
<script src="data/db.js"></script>
<script src="data/load-cards.js"></script>
<script src="data/daily.js"></script>

<script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js" integrity="sha384-DGyLxAyjq0f9SPpVevD6IgztCFlnMF6oW/XQGmfe+IsZ8TqEiDrcHkMLKI6fiB/Z" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js" integrity="sha384-gTGxhz21lVGYNMcdJOyq01Edg0jhn/c22nsx0kyqP0TxaV5WVdsSH1fSDUf5YJj1" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="components/Diagnostics.jsx"></script>

<script type="text/babel">
  // Surface load/render failures inline. Blank-page silence is the worst
  // possible diagnostic for a *diagnostic* page — if components/Diagnostics.jsx
  // fails to load (stale SW + network miss) or the component throws during
  // render, paint a terminal-style fallback with the actual error so the
  // user has something to copy/paste.
  const mount = document.getElementById('root');
  const showFallback = (title, detail) => {
    mount.innerHTML =
      '<div class="kb-shell variant-game">' +
        '<main class="kb-main dx-main" data-screen-label="diagnostics-fallback">' +
          '<div class="dx-head">' +
            '<a href="Settings.html" class="kb-set-back">◂ settings</a>' +
            '<span class="dx-head-title">▸ DIAGNOSTICS // load failure</span>' +
          '</div>' +
          '<div class="dx-banner">' +
            '<span class="dx-banner-prompt">$</span>' +
            '<span>kb --diag --recover</span>' +
            '<span class="dx-banner-cursor"></span>' +
          '</div>' +
          '<section class="dx-sec">' +
            '<div class="dx-sec-head"><span class="dx-sec-title">▸ ' + title + '</span></div>' +
            '<div class="dx-sec-body"><pre style="white-space:pre-wrap;color:var(--fg-1);font:12px/1.5 var(--font-mono);margin:0">' +
              String(detail).replace(/[<>&]/g, c => ({'<':'&lt;','>':'&gt;','&':'&amp;'}[c])) +
            '</pre></div>' +
          '</section>' +
          '<div class="dx-foot">' +
            '<span class="dx-banner-prompt">$</span>' +
            '<span>hint: pull-to-refresh, or Settings → reset caches</span>' +
            '<span class="dx-banner-cursor"></span>' +
          '</div>' +
        '</main>' +
      '</div>';
  };
  try {
    if (typeof DiagnosticsRoot !== 'function') {
      throw new Error('window.DiagnosticsRoot is not defined — components/Diagnostics.jsx failed to load. Likely a stale service worker or offline fetch. Try the version-update banner on Home, or hard-refresh.');
    }
    const root = ReactDOM.createRoot(mount);
    root.render(<DiagnosticsRoot />);
  } catch (e) {
    showFallback('render failed', (e && e.stack) || (e && e.message) || String(e));
  }
  window.addEventListener('error', (ev) => {
    if (mount.children.length === 0) {
      showFallback('uncaught error', (ev.error && ev.error.stack) || ev.message || String(ev));
    }
  });
</script>

<script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('./sw.js').catch(() => {});
  }
</script>
</body>
</html>
